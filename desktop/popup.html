<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src ws://localhost:3001; img-src 'self' data: blob:;" />
  <title>CoLearn Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="popup-mode">
  <div class="popup-container">
    <!-- Draggable titlebar -->
    <div class="popup-titlebar">
      <div class="popup-titlebar-left">
        <span class="popup-status offline" id="popupStatus"></span>
        <span class="popup-title">CoLearn Chat</span>
      </div>
      <div class="popup-controls">
        <button class="popup-btn active" id="pinBtn" title="Unpin from top">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v8M9 6l3 4 3-4M5 17h14M8 12l-3 5h14l-3-5M12 17v5"/>
          </svg>
        </button>
        <button class="popup-btn" id="mainBtn" title="Open main window">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 3v18"/>
          </svg>
        </button>
        <button class="popup-btn popup-close" id="closeBtn" title="Close">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Chat body -->
    <div class="popup-body">
      <div class="chat-panel">
        <div class="chat-header">
          <div class="chat-header-left">
            <span class="chat-title">Chat</span>
            <span class="chat-subtitle">Ask anything or command the agent</span>
          </div>
          <div class="chat-header-right">
            <span class="thinking-badge" id="popupThinking" style="display:none">AI thinking...</span>
            <span class="thinking-badge agent-badge" id="popupAgent" style="display:none">Agent running...</span>
          </div>
        </div>
        <div class="chat-messages" id="popupMessages">
          <div class="chat-empty" id="popupEmpty">
            <div class="chat-empty-icon">&#129302;</div>
            <p>CoLearn Chat</p>
            <span>Ask questions for guidance or give commands for actions.</span>
          </div>
        </div>
        <form class="chat-input-bar" id="popupForm">
          <input type="text" class="chat-input" id="popupInput" placeholder="Connecting..." disabled />
          <button type="submit" class="chat-send" id="popupSendBtn" disabled>Send</button>
        </form>
      </div>
    </div>
  </div>

  <script src="popup-renderer.js"></script>
</body>
</html>
