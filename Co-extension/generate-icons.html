<!DOCTYPE html>
<html>
<body>
<canvas id="c"></canvas>
<script>
// Open this file in a browser, right-click each generated image, and "Save image as".
// Or use the data URLs logged in the console.
const sizes = [16, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  // Background
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = "#6c5ce7";
  ctx.fill();

  // Text
  ctx.fillStyle = "#ffffff";
  ctx.font = `bold ${size * 0.42}px -apple-system, sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("CL", size / 2, size / 2 + size * 0.03);

  const url = canvas.toDataURL("image/png");
  console.log(`icon${size}.png:`, url);

  const img = document.createElement("img");
  img.src = url;
  img.title = `${size}x${size} — right-click to save as icons/icon${size}.png`;
  img.style.margin = "10px";
  document.body.appendChild(img);

  const label = document.createElement("span");
  label.textContent = ` icon${size}.png `;
  document.body.appendChild(label);
});
</script>
</body>
</html>
